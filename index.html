<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadUp</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0f13;--surface:#18181f;--surface2:#22222c;
  --border:rgba(255,255,255,0.07);--text:#e8e4dc;--muted:#7a7a8a;
  --accent:#e8a020;--accent2:#4fa3e0;--green:#3dbf7a;--red:#e05555;
  --tag-bg:rgba(232,160,32,0.1);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.4;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(15,15,19,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Lora',serif;font-size:1.2rem;color:var(--text);letter-spacing:-0.01em;}
.logo em{color:var(--accent);font-style:italic;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:7px 14px;background:transparent;border:none;font-family:'IBM Plex Sans',sans-serif;font-size:0.8rem;color:var(--muted);cursor:pointer;border-radius:6px;transition:all 0.2s;position:relative;}
.nav-tab.active{background:var(--surface2);color:var(--text);}
.nav-tab:hover:not(.active){color:var(--text);}
.nav-badge{position:absolute;top:4px;right:4px;background:var(--accent);color:#000;font-size:0.55rem;font-weight:700;font-family:'IBM Plex Mono',monospace;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* SCREENS */
.screen{display:none;}
.screen.active{display:block;}

/* ======================== LIBRARY ======================== */
.library-header{padding:32px 20px 20px;max-width:720px;margin:0 auto;}
.library-title{font-family:'Lora',serif;font-size:1.6rem;font-weight:700;margin-bottom:6px;}
.library-sub{font-size:0.85rem;color:var(--muted);}
.filter-row{display:flex;gap:8px;padding:0 20px 20px;max-width:720px;margin:0 auto;flex-wrap:wrap;}
.filter-btn{padding:5px 14px;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;cursor:pointer;transition:all 0.2s;}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500;}
.article-grid{max-width:720px;margin:0 auto;padding:0 20px 80px;display:grid;gap:12px;}
.article-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:all 0.2s;position:relative;overflow:hidden;}
.article-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:3px 0 0 3px;opacity:0;transition:opacity 0.2s;}
.article-card:hover{border-color:rgba(255,255,255,0.15);transform:translateX(2px);}
.article-card:hover::before{opacity:1;}
.card-icon{width:48px;height:48px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.card-body{flex:1;min-width:0;}
.card-title{font-family:'Lora',serif;font-size:1rem;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.level-pill{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:500;}
.level-A1{background:rgba(61,191,122,0.15);color:#3dbf7a;}
.level-A2{background:rgba(79,163,224,0.15);color:#4fa3e0;}
.level-B1{background:rgba(232,160,32,0.15);color:#e8a020;}
.level-B2{background:rgba(224,85,85,0.15);color:#e05555;}
.card-topic{font-size:0.75rem;color:var(--muted);}
.card-arrow{color:var(--muted);font-size:1.1rem;flex-shrink:0;}
.card-read-badge{position:absolute;top:12px;right:12px;font-size:0.6rem;color:var(--green);font-family:'IBM Plex Mono',monospace;opacity:0.7;}

/* ======================== READER ======================== */
.reader-topbar{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:90;background:rgba(15,15,19,0.95);backdrop-filter:blur(8px);}
.back-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px;font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-family:'IBM Plex Sans',sans-serif;}
.back-btn:hover{background:var(--surface2);}
.reader-title-bar{font-family:'Lora',serif;font-size:0.9rem;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reader-progress{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);flex-shrink:0;}
.reader-body{max-width:640px;margin:0 auto;padding:32px 20px 60px;}
.reader-meta{display:flex;gap:8px;margin-bottom:20px;align-items:center;}
.reader-main-title{font-family:'Lora',serif;font-size:1.8rem;font-weight:700;line-height:1.25;margin-bottom:28px;}
.reading-text{font-size:1.08rem;line-height:2;}

/* WORD STYLES */
.w{cursor:pointer;border-radius:2px;transition:all 0.12s;padding:0 1px;}
.w:hover{background:rgba(232,160,32,0.18);}
.w.seen{color:var(--accent);}
.w.in-vocab{border-bottom:2px solid rgba(61,191,122,0.6);color:#5de89a;}

/* POPUP */
.word-popup{position:fixed;z-index:500;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:0;max-width:260px;min-width:200px;box-shadow:0 20px 60px rgba(0,0,0,0.7);opacity:0;pointer-events:none;transition:opacity 0.15s,transform 0.15s;transform:translateY(-6px) scale(0.97);}
.word-popup.show{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.popup-inner{padding:14px 16px;}
.popup-word{font-family:'Lora',serif;font-size:1.2rem;color:var(--accent);font-weight:700;margin-bottom:2px;}
.popup-type{font-family:'IBM Plex Mono',monospace;font-size:0.63rem;color:var(--muted);margin-bottom:10px;}
.popup-mn{font-size:0.97rem;color:var(--text);margin-bottom:8px;line-height:1.4;}
.popup-ex{font-size:0.75rem;color:var(--muted);font-style:italic;padding-top:8px;border-top:1px solid var(--border);margin-bottom:10px;}
.popup-add-btn{width:100%;padding:8px;background:var(--tag-bg);border:1px solid rgba(232,160,32,0.3);color:var(--accent);border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.popup-add-btn:hover{background:rgba(232,160,32,0.2);}
.popup-add-btn.added{background:rgba(61,191,122,0.1);border-color:rgba(61,191,122,0.3);color:var(--green);}
.popup-add-btn.added:hover{background:rgba(61,191,122,0.15);}
.popup-footer{padding:10px 16px;border-top:1px solid var(--border);}

/* VOCAB BAR */
.vocab-bar{margin-top:32px;padding:20px;background:var(--surface);border-radius:10px;border:1px solid var(--border);}
.vocab-bar-title{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
.vocab-chips{display:flex;flex-wrap:wrap;gap:8px;}
.vocab-chip{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all 0.15s;}
.vocab-chip:hover{border-color:var(--accent);background:var(--tag-bg);}
.chip-en{font-size:0.85rem;color:var(--text);}
.chip-mn{font-size:0.72rem;color:var(--muted);margin-top:1px;}

.reader-actions{display:flex;gap:10px;margin-top:32px;}
.btn-main{flex:1;padding:14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:0.92rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-main:hover{background:#f0b030;}
.btn-ghost{padding:14px 20px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:0.92rem;cursor:pointer;transition:all 0.2s;}
.btn-ghost:hover{background:var(--surface2);}

/* ======================== VOCAB SCREEN ======================== */
.vocab-screen-body{max-width:720px;margin:0 auto;padding:24px 20px 80px;}
.vocab-screen-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.vocab-screen-title{font-family:'Lora',serif;font-size:1.4rem;font-weight:700;}
.vocab-clear-btn{padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;font-size:0.78rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all 0.2s;}
.vocab-clear-btn:hover{border-color:var(--red);color:var(--red);}
.vocab-screen-sub{font-size:0.82rem;color:var(--muted);margin-bottom:24px;}

.vocab-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.vc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;}
.vc:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.vc-en{font-family:'Lora',serif;font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:6px;}
.vc-mn{font-size:0.82rem;color:var(--muted);line-height:1.4;}
.vc-type{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--accent);margin-bottom:6px;}
.vc-del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);font-size:0.9rem;cursor:pointer;opacity:0;transition:opacity 0.2s;}
.vc:hover .vc-del{opacity:1;}
.vc-del:hover{color:var(--red);}

/* STUDY MODE */
.study-btn{padding:10px 20px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
.study-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.study-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,14,0.95);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.study-overlay.show{display:flex;}
.study-card-wrap{max-width:380px;width:90%;text-align:center;}
.study-close{position:absolute;top:20px;right:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:8px 14px;font-size:0.82rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.study-card{background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:48px 32px;margin-bottom:20px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.study-card:hover{transform:translateY(-2px);}
.study-en{font-family:'Lora',serif;font-size:2rem;color:var(--text);font-weight:700;margin-bottom:8px;}
.study-type{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);}
.study-mn{font-size:1.1rem;color:var(--accent);margin-top:20px;display:none;}
.study-mn.show{display:block;}
.study-hint{font-size:0.75rem;color:var(--muted);margin-top:12px;}
.study-nav{display:flex;gap:12px;justify-content:center;}
.study-nav-btn{padding:10px 24px;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;}
.s-next{background:var(--accent);color:#000;}
.s-next:hover{background:#f0b030;}
.s-prev{background:var(--surface2);color:var(--text);}
.s-prev:hover{background:var(--surface);}
.study-prog{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--muted);text-align:center;margin-bottom:16px;}

/* ======================== QUIZ ======================== */
.quiz-body{max-width:640px;margin:0 auto;padding:24px 20px 80px;}
.quiz-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.quiz-list-title{font-family:'Lora',serif;font-size:1.3rem;font-weight:700;}
.add-quiz-btn{padding:8px 16px;background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.add-quiz-btn:hover{background:#f0b030;}
.quiz-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.2s;}
.quiz-item:hover{border-color:rgba(255,255,255,0.15);transform:translateX(2px);}
.quiz-item-body{flex:1;}
.quiz-item-title{font-family:'Lora',serif;font-size:0.95rem;font-weight:600;margin-bottom:4px;}
.quiz-item-meta{font-size:0.78rem;color:var(--muted);}
.quiz-item-score{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;color:var(--green);font-weight:500;}
.quiz-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;display:none;}
.quiz-form.open{display:block;}
.form-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;margin-bottom:18px;}
.form-field{margin-bottom:14px;}
.form-label{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:6px;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:rgba(232,160,32,0.5);}
.form-input::placeholder{color:var(--muted);}
.q-builder{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;position:relative;}
.q-num{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--accent);margin-bottom:8px;}
.q-delete{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.opt-row{display:flex;gap:6px;align-items:center;}
.opt-radio{accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.opt-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px 10px;font-size:0.82rem;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.opt-input:focus{border-color:rgba(232,160,32,0.4);}
.add-q-btn{width:100%;padding:10px;background:var(--surface2);border:1px dashed var(--border);color:var(--muted);border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;margin-top:6px;}
.add-q-btn:hover{border-color:var(--accent);color:var(--accent);}
.form-actions{display:flex;gap:10px;margin-top:16px;}
.btn-save{flex:1;padding:12px;background:var(--accent);color:#000;border:none;border-radius:6px;font-weight:600;font-size:0.9rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.btn-cancel{padding:12px 18px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;font-size:0.9rem;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;}
.quiz-take{display:none;}
.quiz-take.active{display:block;}
.take-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.take-title{font-family:'Lora',serif;font-size:1.2rem;font-weight:700;flex:1;}
.take-prog{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--muted);}
.prog-bar{height:3px;background:var(--surface2);border-radius:99px;margin-bottom:28px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.5s;}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.3);}
.q-label{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.q-text{font-family:'Lora',serif;font-size:1.1rem;line-height:1.5;margin-bottom:20px;}
.q-opts{display:flex;flex-direction:column;gap:10px;}
.q-opt{padding:13px 16px;background:var(--surface2);color:var(--text);border:1.5px solid var(--border);border-radius:8px;font-size:0.92rem;cursor:pointer;text-align:left;transition:all 0.15s;font-family:'IBM Plex Sans',sans-serif;}
.q-opt:hover:not(:disabled){border-color:rgba(255,255,255,0.2);background:#2a2a35;transform:translateX(3px);}
.q-opt.correct{background:rgba(61,191,122,0.12);border-color:var(--green);color:var(--green);}
.q-opt.wrong{background:rgba(224,85,85,0.1);border-color:var(--red);color:var(--red);}
.q-opt:disabled{cursor:default;}
.q-fb{margin-top:16px;padding:12px 16px;border-radius:6px;font-size:0.88rem;line-height:1.5;display:none;}
.q-fb.show{display:block;}
.q-fb.ok{background:rgba(61,191,122,0.1);border-left:3px solid var(--green);color:#7de8a8;}
.q-fb.bad{background:rgba(224,85,85,0.08);border-left:3px solid var(--red);color:#e08080;}
.result-box{text-align:center;padding:40px 24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.result-big{font-family:'Lora',serif;font-size:4.5rem;color:var(--text);line-height:1;}
.result-big span{color:var(--accent);}
.result-sub{color:var(--muted);font-size:1rem;margin:8px 0 28px;}
.result-detail{background:var(--surface2);border-radius:8px;padding:16px;margin-bottom:24px;text-align:left;}
.result-detail-title{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:10px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:12px;opacity:0.4;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:0.85rem;z-index:600;transition:transform 0.3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .opts-grid{grid-template-columns:1fr;}
  .reader-main-title{font-size:1.4rem;}
  .result-big{font-size:3.5rem;}
  .vocab-cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- WORD POPUP -->
<div class="word-popup" id="popup">
  <div class="popup-inner">
    <div class="popup-word" id="p-word"></div>
    <div class="popup-type" id="p-type"></div>
    <div class="popup-mn" id="p-mn"></div>
    <div class="popup-ex" id="p-ex"></div>
  </div>
  <div class="popup-footer">
    <button class="popup-add-btn" id="p-add-btn" onclick="addFromPopup()">
      <span id="p-add-icon">＋</span>
      <span id="p-add-text">Үгийн санд нэмэх</span>
    </button>
  </div>
</div>

<!-- STUDY OVERLAY -->
<div class="study-overlay" id="studyOverlay">
  <button class="study-close" onclick="closeStudy()">✕ Хаах</button>
  <div class="study-card-wrap">
    <div class="study-prog" id="studyProg"></div>
    <div class="study-card" id="studyCard" onclick="revealStudy()">
      <div class="study-en" id="studyEn"></div>
      <div class="study-type" id="studyType"></div>
      <div class="study-mn" id="studyMn"></div>
      <div class="study-hint" id="studyHint">→ Дарж орчуулга харах</div>
    </div>
    <div class="study-nav">
      <button class="study-nav-btn s-prev" onclick="studyNav(-1)">← Өмнөх</button>

// ==================== READER ====================
function openReader(id){
  const art=ARTICLES.find(a=>a.id===id);
  if(!art)return;
  currentArticle=art;
  ST.read[id]=true;save();
  document.getElementById('readerTitleBar').textContent=art.title;
  document.getElementById('readerMeta').innerHTML=`
    <span class="level-pill level-${art.level}">${art.level}</span>
    <span style="font-size:0.8rem;color:var(--muted);">${art.topic}</span>`;
  document.getElementById('readerTitle').textContent=art.title;
  const wc=art.text.split(/\s+/).length;
  document.getElementById('readerProgress').textContent=`~${wc} үг`;

  // Tokenize — ALL words get .w class
  const tokens=art.text.split(/(\s+)/);
  let html='';
  tokens.forEach(tok=>{
    if(/^\s+$/.test(tok)){html+=tok;return;}
    // Split punctuation
    const match=tok.match(/^([^a-zA-Z']*)([a-zA-Z']+)([^a-zA-Z']*)$/);
    if(match){
      const pre=match[1],word=match[2],post=match[3];
      const clean=word.toLowerCase();
      const inVocab=ST.vocab.some(v=>v.en===clean);
      const cls='w'+(inVocab?' in-vocab':'');
      html+=pre+`<span class="${cls}" data-w="${clean}">${word}</span>`+post;
    } else {
      html+=tok;
    }
  });

  document.getElementById('readerText').innerHTML=html;

  // Attach events
  document.querySelectorAll('#readerText .w').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();showWordPopup(e,el);});
  });

  // Vocab bar (key words)
  const chips=art.vocab.map(w=>{
    const d=D[w];if(!d)return'';
    return`<div class="vocab-chip" data-w="${w}">
      <div class="chip-en">${w}</div>
      <div class="chip-mn">${d.mn}</div>
    </div>`;
  }).join('');
  if(chips){
    document.getElementById('vocabBar').style.display='block';
    document.getElementById('vocabChips').innerHTML=chips;
    document.querySelectorAll('.vocab-chip').forEach(el=>{
      el.addEventListener('click',e=>{
        e.stopPropagation();
        showWordPopupAt(el.getBoundingClientRect().left,el.getBoundingClientRect().bottom+8,el.dataset.w);
      });
    });
  } else {
    document.getElementById('vocabBar').style.display='none';
  }

  switchScreen('reader');
}

function showWordPopup(e,el){
  const word=el.dataset.w;
  showWordPopupAt(e.clientX+10,e.clientY-10,word);
}

function showWordPopupAt(x,y,word){
  const d=D[word];
  const p=document.getElementById('popup');
  document.getElementById('p-word').textContent=word;
  if(d){
    document.getElementById('p-type').textContent=d.type||'';
    document.getElementById('p-mn').textContent=d.mn;
    const ex=document.getElementById('p-ex');
    ex.textContent=d.ex?`"${d.ex}"`:'';
    ex.style.display=d.ex?'block':'none';
    document.getElementById('popup-footer')||null;
    document.querySelector('.popup-footer').style.display='block';
  } else {
    document.getElementById('p-type').textContent='';
    document.getElementById('p-mn').textContent='Орчуулга байхгүй';
    document.getElementById('p-ex').style.display='none';
    document.querySelector('.popup-footer').style.display='none';
  }
  popupWord=word;
  // Update add button state
  updateAddBtn();
  const px=Math.min(x,window.innerWidth-280);
  const py=y>160?y-150:y+20;
  p.style.left=px+'px';p.style.top=py+'px';
  p.classList.add('show');
}

function updateAddBtn(){
  if(!popupWord)return;
  const btn=document.getElementById('p-add-btn');
  const icon=document.getElementById('p-add-icon');
  const txt=document.getElementById('p-add-text');
  const already=ST.vocab.some(v=>v.en===popupWord);
  if(already){
    btn.classList.add('added');
    icon.textContent='✓';
    txt.textContent='Үгийн санд байна';
  } else {
    btn.classList.remove('added');
    icon.textContent='＋';
    txt.textContent='Үгийн санд нэмэх';
  }
}

function addFromPopup(){
  if(!popupWord)return;
  const d=D[popupWord];
  const already=ST.vocab.some(v=>v.en===popupWord);
  if(already){
    // Remove
    ST.vocab=ST.vocab.filter(v=>v.en!==popupWord);
    save();
    updateAddBtn();
    updateVocabBadge();
    refreshWordStyles();
    showToast('Үгийн сангаас хасагдлаа');
  } else {
    ST.vocab.push({en:popupWord,mn:d?d.mn:'',type:d?d.type:'',ex:d?d.ex||'':''});
    save();
    updateAddBtn();
    updateVocabBadge();
    refreshWordStyles();
    showToast('✓ Үгийн санд нэмэгдлээ!');
  }
}

function refreshWordStyles(){
  document.querySelectorAll('#readerText .w').forEach(el=>{
    const inV=ST.vocab.some(v=>v.en===el.dataset.w);
    el.classList.toggle('in-vocab',inV);
  });
}

let qCount=0;
function toggleAddForm(){
  const f=document.getElementById('quizForm');
  f.classList.toggle('open');
  if(f.classList.contains('open')&&!document.getElementById('qBuilderList').children.length){
    qCount=0;document.getElementById('qBuilderList').innerHTML='';addQuestion();
  }
}
function addQuestion(){
  qCount++;
  const id='q'+qCount;
  const div=document.createElement('div');
  div.className='q-builder';div.id=id;
  div.innerHTML=`
    <div class="q-num">АСУУЛТ ${qCount}</div>
    <button class="q-delete" onclick="document.getElementById('${id}').remove()">✕</button>
    <input class="form-input" placeholder="Асуулт бичнэ үү..." style="margin-bottom:10px;" data-role="qtext">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:8px;">● Зөв хариултын радио товчийг дарна</div>
    <div class="opts-grid">
      ${[0,1,2,3].map(i=>`<div class="opt-row"><input type="radio" name="ans_${id}" class="opt-radio" value="${i}" ${i===0?'checked':''}><input class="opt-input" placeholder="Сонголт ${String.fromCharCode(65+i)}" data-role="opt"></div>`).join('')}
    </div>`;
  document.getElementById('qBuilderList').appendChild(div);
}
function saveQuiz(){
  const title=document.getElementById('qTitle').value.trim();
  const level=document.getElementById('qLevel').value;
  if(!title){showToast('Нэр оруулна уу');return;}
  const builders=document.querySelectorAll('.q-builder');
  const questions=[];
  for(const b of builders){
    const qtext=b.querySelector('[data-role=qtext]').value.trim();
    if(!qtext)continue;
    const opts=[...b.querySelectorAll('[data-role=opt]')].map(i=>i.value.trim());
    if(opts.some(o=>!o)){showToast('Бүх сонголтыг бөглөнө үү');return;}
    const checked=b.querySelector('.opt-radio:checked');
    questions.push({q:qtext,opts,ans:checked?parseInt(checked.value):0});
  }
  if(!questions.length){showToast('Дор хаяж нэг асуулт нэмнэ үү');return;}
  const icons=['📝','🧠','⭐','🎯','🔥','💡','🌟'];
  const quiz={id:'qz'+Date.now(),title,level,questions,icon:icons[Math.floor(Math.random()*icons.length)],created:new Date().toLocaleDateString('mn-MN')};
  ST.quizzes.unshift(quiz);save();
  document.getElementById('qTitle').value='';
  document.getElementById('qBuilderList').innerHTML='';
  qCount=0;
  document.getElementById('quizForm').classList.remove('open');
  renderQuizList();showToast('✓ Тест хадгалагдлаа!');
}

// ==================== TAKE QUIZ ====================
function startQuiz(id){
  const quiz=ST.quizzes.find(q=>q.id===id);
  if(!quiz)return;
  QT={quiz,cur:0,correct:0};
  document.getElementById('takeTitleEl').textContent=quiz.title;
  document.getElementById('quizListView').style.display='none';
  document.getElementById('quizTakeView').classList.add('active');
  renderQCard();
}
function renderQCard(){
  const q=QT.quiz.questions[QT.cur];
  const tot=QT.quiz.questions.length;
  document.getElementById('takeProgEl').textContent=`${QT.cur+1} / ${tot}`;
  document.getElementById('progFill').style.width=(QT.cur/tot*100)+'%';
  const opts=q.opts.map((o,i)=>`<button class="q-opt" onclick="answerQ(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('');
  document.getElementById('qCardArea').innerHTML=`<div class="q-card"><div class="q-label">АСУУЛТ ${QT.cur+1}</div><div class="q-text">${q.q}</div><div class="q-opts">${opts}</div><div class="q-fb" id="qfb"></div></div>`;
}
function answerQ(idx){
  const q=QT.quiz.questions[QT.cur];
  const btns=document.querySelectorAll('.q-opt');
  btns.forEach(b=>b.disabled=true);
  const ok=idx===q.ans;
  if(ok)QT.correct++;
  btns[idx].classList.add(ok?'correct':'wrong');
  if(!ok)btns[q.ans].classList.add('correct');
  const fb=document.getElementById('qfb');
  fb.textContent=ok?'✓ Зөв!':'✗ Буруу. Зөв хариулт: '+String.fromCharCode(65+q.ans)+'. '+q.opts[q.ans];
  fb.className='q-fb show '+(ok?'ok':'bad');
  setTimeout(()=>{QT.cur++;if(QT.cur>=QT.quiz.questions.length)showQuizResult();else renderQCard();},1800);
}
function showQuizResult(){
  const tot=QT.quiz.questions.length,sc=QT.correct;
  ST.scores[QT.quiz.id]={score:sc,total:tot,date:new Date().toLocaleDateString('mn-MN')};save();
  const pct=Math.round(sc/tot*100);
  const msg=sc===tot?'Төгс! 🏆':sc>=tot*0.8?'Гайхалтай! 🌟':sc>=tot*0.6?'Сайн байна! 📖':'Дахин оролдоорой 💪';
  document.getElementById('progFill').style.width='100%';
  document.getElementById('qCardArea').innerHTML=`
    <div class="result-box">
      <div class="result-big">${sc}<span>/${tot}</span></div>
      <div class="result-sub">${msg} · ${pct}%</div>
      <div class="result-detail"><div class="result-detail-title">ДҮНГИЙН ХУРААНГУЙ</div>
        <div style="display:flex;gap:24px;">
          <div><div style="font-size:1.4rem;color:var(--green);font-weight:600;">${sc}</div><div style="font-size:0.75rem;color:var(--muted);">Зөв</div></div>
          <div><div style="font-size:1.4rem;color:var(--red);font-weight:600;">${tot-sc}</div><div style="font-size:0.75rem;color:var(--muted);">Буруу</div></div>
          <div><div style="font-size:1.4rem;color:var(--accent);font-weight:600;">${pct}%</div><div style="font-size:0.75rem;color:var(--muted);">Оноо</div></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn-main" style="flex:1;" onclick="startQuiz('${QT.quiz.id}')">🔄 Дахин</button>
        <button class="btn-ghost" onclick="endQuiz()" style="flex:1;">← Буцах</button>
      </div>
    </div>`;
  renderQuizList();
}
function endQuiz(){
  document.getElementById('quizListView').style.display='block';
  document.getElementById('quizTakeView').classList.remove('active');
  document.getElementById('qCardArea').innerHTML='';
}

// ==================== NAVIGATION ====================
function switchTab(name,btn){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='library'){switchScreen('library');renderLibrary();}
  else if(name==='vocab'){switchScreen('vocab');renderVocabScreen();}
  else if(name==='quiz'){switchScreen('quiz');renderQuizList();endQuiz();}
}
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scr-'+name).classList.add('active');
}

// ==================== TOAST ====================
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ==================== INIT ====================
renderLibrary();
updateVocabBadge();
</script>
